*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;background:#000}
body{-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif}
input,button,select,textarea{-webkit-appearance:none;font-family:'DM Sans',sans-serif}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input::placeholder,textarea::placeholder{opacity:.35}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#4a7c59;border-radius:2px}
@keyframes pulse-ring{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}
@keyframes slide-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tick{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes pr-pop{0%{transform:scale(1)}30%{transform:scale(1.2) rotate(-2deg)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(90px) rotate(540deg);opacity:0}}
@keyframes float-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes typing{0%,60%,100%{opacity:.15}30%{opacity:1}}
.anim{animation:slide-up .2s ease both}
.pr-pop{animation:pr-pop .5s ease}
#root{max-width:600px;margin:0 auto;min-height:100vh}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin:0 2px;animation:typing 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
</style>

const calcVol=sets=>sets.reduce((s,x)=>(parseFloat(x.weight)||0)*(parseInt(x.reps)||0)+s,0);
const getExName=(row,exercises)=>{
  if(row.exId){const e=exercises.find(x=>x.id===row.exId);return e?e.name:row.customName||"";}
  return row.customName||"";
};
const getPR=(exId,logs,loc)=>{
  let pr=0;
  logs.forEach(log=>{ (log.rows||[]).forEach(row=>{
    if(row.exId!==exId)return;
    if(loc&&loc!=="all"&&row.location!==loc)return;
    (row.sets||[]).forEach(s=>{const w=parseFloat(s.weight)||0;if(w>pr)pr=w;});
  });});
  return pr;
};
const getProgress=(exId,logs,loc)=>{
  const pts=[];
  logs.forEach(log=>{ (log.rows||[]).forEach(row=>{
    if(row.exId!==exId)return;
    if(loc&&loc!=="all"&&row.location!==loc)return;
    const maxW=Math.max(0,...(row.sets||[]).map(s=>parseFloat(s.weight)||0));
    if(maxW>0)pts.push({x:new Date(log.date).getTime(),date:log.date,y:maxW,sets:row.sets||[]});
  });});
  return pts.sort((a,b)=>a.x-b.x);
};

// ── AI ────────────────────────────────────────────────────────────────────────
async function callAI(apiKey,messages,system){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system,messages})
  });
  if(!r.ok){const e=await r.json();throw new Error((e.error&&e.error.message)||"Błąd API");}
  const d=await r.json();
  return d.content[0].text;
}
async function aiFirstSet(apiKey,exName,history,loc,planReps){
  if(!history||!history.length)return null;
  const prev=history.slice(-4).map(p=>p.date+": "+p.y+"kg ("+p.sets.map(s=>s.weight+"x"+s.reps).join(", ")+")").join(" | ");
  const locLabel=(LOCS_DEFAULT.find(l=>l.id===loc)||LOCS_DEFAULT[2]).label;
  const repsInfo=planReps?"\nDocelowy zakres powt: "+planReps:"";
  return callAI(apiKey,[{role:"user",content:"Cwiczenie: "+exName+"\nLokalizacja: "+locLabel+repsInfo+"\nOstatnie sesje: "+prev}],
    "Jestes trenerem. Odpowiadaj po polsku. JEDNO zdanie: konkretna sugestia ciezaru na pierwsza serie dopasowan do docelowego zakresu powtorzen. Format: Zacznij od Xkg x Y powt. (uzasadnienie).");
}
async function aiSetComment(apiKey,exName,weight,reps,history,prevSets,setNum,planReps){
  const prev=history.slice(-3).map(p=>p.date+": "+p.y+"kg").join(", ");
  const today=prevSets.length>0?prevSets.map((s,i)=>"S"+(i+1)+": "+s.weight+"x"+s.reps).join(", "):"pierwsza seria";
  const repsInfo=planReps?"\nDocelowy zakres powtorzen z planu: "+planReps:"";
  return callAI(apiKey,[{role:"user",content:"Cwiczenie: "+exName+"\nSeria "+setNum+": "+weight+"kg x "+reps+" powt.\nDzis: "+today+"\nPR historia: "+(prev||"brak")+repsInfo}],
    "Jestes trenerem. Po polsku. Max 2 zdania. Skomentuj serie i podaj KONKRETNA sugestie na nastepna serie (ile kg x ile powt) w zakresie "+(planReps||"8-12")+" powtorzen.");
}
function extractPlan(text){
  const m=text.match(/```json([\s\S]*?)```/);
  if(m){try{return JSON.parse(m[1].trim());}catch{}}
  return null;
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function Sparkline({data,color}){
  if(!data||data.length<2)return null;
  const W=300,H=60,pad=8;
  const xs=data.map(d=>d.x),ys=data.map(d=>d.y);
  const minX=Math.min.apply(null,xs),maxX=Math.max.apply(null,xs);
  const minY=Math.min.apply(null,ys)*.95,maxY=Math.max.apply(null,ys)*1.05;
  const px=x=>pad+(x-minX)/(maxX-minX||1)*(W-2*pad);
  const py=y=>H-pad-(y-minY)/(maxY-minY||1)*(H-2*pad);
  const pts=data.map(d=>px(d.x)+","+py(d.y)).join(" ");
  const area="M"+px(xs[0])+","+H+" "+data.map(d=>"L"+px(d.x)+","+py(d.y)).join(" ")+" L"+px(xs[xs.length-1])+","+H+" Z";
  const gid="g"+(color||"").replace(/[^a-z0-9]/gi,"x");
  return h("svg",{width:"100%",viewBox:"0 0 "+W+" "+H,preserveAspectRatio:"none",style:{overflow:"visible"}},
    h("defs",null,h("linearGradient",{id:gid,x1:"0",x2:"0",y1:"0",y2:"1"},
      h("stop",{offset:"0%",stopColor:color,stopOpacity:".3"}),h("stop",{offset:"100%",stopColor:color,stopOpacity:"0"}))),
    h("path",{d:area,fill:"url(#"+gid+")"}),
    h("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinejoin:"round",strokeLinecap:"round"}),
    data.map((d,i)=>h("circle",{key:i,cx:px(d.x),cy:py(d.y),r:3,fill:color,stroke:"transparent",strokeWidth:2}))
  );
}

// ── Rest Timer ────────────────────────────────────────────────────────────────
function RestTimer({autoStartRef}){
  const C=useC();
  const [preset,setPreset]=useState(90);
  const [endTime,setEndTime]=useState(null); // timestamp when timer ends
  const [finished,setFinished]=useState(false);
  const [expanded,setExpanded]=useState(false);
  const [,tick]=useState(0);
  const intervalRef=useRef(null);
  const finishedRef=useRef(false);

  // Calculate remaining from endTime
  const running=endTime!==null&&!finished;
  const rem=endTime?Math.max(0,Math.ceil((endTime-Date.now())/1000)):preset;
  const pct2=Math.max(0,Math.min(1,rem/preset));

  const fireAlarm=()=>{
    if(navigator.vibrate)navigator.vibrate([300,100,300,100,500]);
    try{const ac=new(window.AudioContext||window.webkitAudioContext)();
      const bk=(f,s,d)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=f;g.gain.setValueAtTime(0.4,ac.currentTime+s);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+s+d);o.start(ac.currentTime+s);o.stop(ac.currentTime+s+d+0.05);};
      bk(880,0,.15);bk(880,.2,.15);bk(1100,.4,.3);}catch(e){}
  };

  useEffect(()=>{
    if(!endTime)return;
    finishedRef.current=false;
    intervalRef.current=setInterval(()=>{
      const left=endTime-Date.now();
      if(left<=0&&!finishedRef.current){
        finishedRef.current=true;
        clearInterval(intervalRef.current);
        setEndTime(null);
        setFinished(true);
        fireAlarm();
      }
      tick(n=>n+1);
    },250); // check 4x/sec so it catches finish even if throttled
    return()=>clearInterval(intervalRef.current);
  },[endTime]);

  const go=()=>{setFinished(false);setEndTime(Date.now()+preset*1000);};
  const pause=()=>{setEndTime(null);};
  const reset=()=>{setEndTime(null);setFinished(false);};
  const changePreset=v=>{setPreset(v);setEndTime(null);setFinished(false);};

  useEffect(()=>{
    if(autoStartRef)autoStartRef.current=(seconds)=>{
      const s=seconds||preset;
      setPreset(s);setFinished(false);setEndTime(Date.now()+s*1000);setExpanded(false);
    };
  },[autoStartRef,preset]);
  const R=18,circ=2*Math.PI*R;
  const mm=String(Math.floor(rem/60)).padStart(2,"0"),ss=String(rem%60).padStart(2,"0");
  const col=finished?C.danger:running?C.accent:C.muted2;
  return h("div",{style:{background:C.card,border:"1px solid "+(finished?C.danger:running?C.accent:C.border2),borderRadius:12,padding:expanded?"14px 16px":"8px 14px",transition:"border-color .3s",marginBottom:16}},
    h("div",{style:{display:"flex",alignItems:"center",gap:10}},
      h("div",{style:{position:"relative",width:42,height:42,flexShrink:0}},
        h("svg",{width:42,height:42,style:{transform:"rotate(-90deg)"}},
          h("circle",{cx:21,cy:21,r:R,fill:"none",stroke:C.border,strokeWidth:3.5}),
          h("circle",{cx:21,cy:21,r:R,fill:"none",stroke:col,strokeWidth:3.5,strokeDasharray:(circ*pct2)+" "+circ,strokeLinecap:"round",style:{transition:"stroke-dasharray .9s linear,stroke .3s"}})
        ),
        finished&&h("div",{style:{position:"absolute",inset:0,borderRadius:"50%",border:"2px solid "+C.danger,animation:"pulse-ring 1s ease-out infinite"}}),
        h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}},"⏱")
      ),
      h("div",{style:{flex:1}},
        h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:col,lineHeight:1,animation:running?"tick 1s ease infinite":"none"}},mm+":"+ss),
        h("div",{style:{fontSize:10,color:C.muted,letterSpacing:".08em",textTransform:"uppercase"}},finished?"✓ Gotowy!":running?"Odpoczywasz…":"Przerwa między seriami")
      ),
      h("div",{style:{display:"flex",gap:5,alignItems:"center"}},
        !running?h("button",{onClick:go,style:{fontWeight:700,fontSize:12,background:C.accent,color:C.accentTxt,border:"none",borderRadius:6,padding:"7px 13px",cursor:"pointer"}},"▶ START")
                :h("button",{onClick:pause,style:{fontWeight:700,fontSize:12,background:"transparent",color:C.text,border:"1px solid "+C.border2,borderRadius:6,padding:"7px 11px",cursor:"pointer"}},"⏸"),
        h("button",{onClick:reset,style:{fontSize:13,background:"transparent",color:C.muted2,border:"1px solid "+C.border,borderRadius:6,padding:"7px 9px",cursor:"pointer"}},"↺"),
        h("button",{onClick:()=>setExpanded(e=>!e),style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"0 3px"}},expanded?"▲":"▼")
      )
    ),
    expanded&&h("div",{style:{marginTop:12}},
      h(Lbl,null,"Szybki wybór"),
      h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}},
        REST_OPTIONS.map(p=>h("button",{key:p,onClick:()=>changePreset(p),style:{fontWeight:600,fontSize:11,background:preset===p?C.accent:C.surface,color:preset===p?C.accentTxt:C.muted2,border:"1px solid "+(preset===p?C.accent:C.border),borderRadius:6,padding:"4px 11px",cursor:"pointer"}},restLabel(p))),
        h(Inp,{type:"number",value:preset,onChange:v=>changePreset(Number(v)),placeholder:"sek",style:{width:70,padding:"4px 8px",fontSize:12}})
      )
    )
  );
}

// ── ExSelector ────────────────────────────────────────────────────────────────
function ExSelector({exercises,value,onChange,onSelect}){
  const C=useC();
  const [open,setOpen]=useState(false);
  const filtered=exercises.filter(e=>e.name.toLowerCase().includes((value||"").toLowerCase())).slice(0,6);

// ── Log Tab ───────────────────────────────────────────────────────────────────
function LogTab(p){
  const C=useC();
  const {onSave,exercises,logs,apiKey,onBack,
    date,setDate,wname,setWname,loc,setLoc,rows,setRows,
    summary,setSummary,prEvent,setPrEvent,
    setComments,setSetComments,loadingCmt,setLoadingCmt,
    collapsed,setCollapsed,showHist,setShowHist,
    firstSug,setFirstSug,loadingFirstSug,setLoadingFirstSug,
    dismissedSug,setDismissedSug}=p;

  const autoStartRef=useRef(null);
  const gyms=useGyms();
  const lang=useLang();
  const S=(p,e)=>lang==="en"?e:p;

  // Auto-fetch first-set suggestions + prefill sets when rows with exId are loaded (e.g. from plan)
  useEffect(()=>{
    rows.forEach(row=>{
      if(row.exId){
        // prefill sets from last session (only if sets are empty)
        const allEmpty=row.sets.every(s=>!s.weight&&!s.reps);
        if(allEmpty)prefillSets(row.id,row.exId,row.location);
        // fetch AI suggestion
        if(apiKey&&!firstSug[row.id]&&!loadingFirstSug[row.id])
          fetchFirstSug(row.id,row.exId,row.location);
      }
    });
  },[rows.map(r=>r.id+":"+(r.exId||"")).join(","),apiKey]);

  const updSet=(rid,sid,f,v)=>setRows(r=>r.map(x=>x.id===rid?{...x,sets:x.sets.map(s=>s.id===sid?{...s,[f]:v}:s)}:x));
  const addSet=rid=>setRows(r=>r.map(x=>x.id===rid?{...x,sets:[...x.sets,mkSet()]}:x));
  const delSet=(rid,sid)=>setRows(r=>r.map(x=>x.id===rid?{...x,sets:x.sets.filter(s=>s.id!==sid)}:x));
  const updRow=(rid,patch)=>setRows(r=>r.map(x=>x.id===rid?{...x,...patch}:x));
  const addRow=()=>setRows(r=>[...r,mkRow(loc)]);
  const delRow=rid=>setRows(r=>r.filter(x=>x.id!==rid));

  const prefillSets=(rowId,exId,location)=>{
    if(!exId)return;
    const hist=getProgress(exId,logs,location);
    if(!hist.length)return;
    // get the most recent session's sets for this exercise
    const lastPt=hist[hist.length-1];
    if(!lastPt||!lastPt.sets||!lastPt.sets.length)return;
    const lastSets=lastPt.sets.filter(s=>s.weight||s.reps);
    if(!lastSets.length)return;
    setRows(prev=>prev.map(r=>{
      if(r.id!==rowId)return r;
      // fill existing sets with last session values, cycling if needed
      const newSets=r.sets.map((s,i)=>{
        const ref=lastSets[Math.min(i,lastSets.length-1)];
        return{...s,weight:ref.weight||s.weight,reps:ref.reps||s.reps};
      });
      return{...r,sets:newSets};
    }));
  };

  const fetchFirstSug=async(rowId,exId,location)=>{
    if(!apiKey||!exId||firstSug[rowId]||loadingFirstSug[rowId])return;
    const hist=getProgress(exId,logs,location);
    const ex=exercises.find(e=>e.id===exId);
    if(!ex)return;
    const targetRow=rows.find(r=>r.id===rowId);
    const planReps=targetRow&&targetRow.planReps||null;
    if(!hist.length){setFirstSug(prev=>({...prev,[rowId]:"Pierwsze podejście! Zacznij od ciężaru który możesz wykonać technicznie na "+(planReps||"10-12")+" powtórzeń."}));return;}
    setLoadingFirstSug(prev=>({...prev,[rowId]:true}));
    try{const s=await aiFirstSet(apiKey,ex.name,hist,location,planReps);if(s)setFirstSug(prev=>({...prev,[rowId]:s}));}
    catch(e){setFirstSug(prev=>({...prev,[rowId]:"Błąd AI: "+e.message}));}
    setLoadingFirstSug(prev=>({...prev,[rowId]:false}));
  };

  const handleCheck=async(rowId,setId)=>{
    const currentRow=rows.find(x=>x.id===rowId);if(!currentRow)return;
    const si=currentRow.sets.findIndex(x=>x.id===setId);if(si<0)return;
    const currentSet=currentRow.sets[si];
    const wasAlreadyDone=currentSet.done;
    setRows(prev=>prev.map(r=>r.id!==rowId?r:{...r,sets:r.sets.map(s=>s.id!==setId?s:{...s,done:!s.done})}));
    if(wasAlreadyDone)return;
    // auto-start timer only
    if(autoStartRef.current)autoStartRef.current(currentRow.restSeconds||90);
  };

  const handleSave=()=>{
    const filled=rows.filter(r=>getExName(r,exercises).trim()||r.sets.some(s=>s.reps||s.weight));
    if(!filled.length)return;
    filled.forEach(row=>{
      if(!row.exId)return;
      const oldPR=getPR(row.exId,logs,row.location);
      const newMax=Math.max(0,...row.sets.map(s=>parseFloat(s.weight)||0));
      if(newMax>oldPR&&newMax>0)setPrEvent({exName:getExName(row,exercises),weight:newMax});
    });
    const n=wname||(()=>{const d=new Date(date);return"Trening "+d.toLocaleDateString("pl-PL",{weekday:"short",day:"numeric",month:"short"});})();
    const vol=filled.reduce((s,r)=>s+calcVol(r.sets),0);
    onSave({id:uid(),date,name:n,location:loc,rows:filled,volume:Math.round(vol)});
    const locLabel=(LOCS_DEFAULT.find(l=>l.id===loc)||LOCS_DEFAULT[2]).label;
    let lines=["💪 *"+n+"* — "+date,"📍 "+locLabel,"📦 Objętość: "+Math.round(vol).toLocaleString()+" kg",""];
    filled.forEach((row,i)=>{
      lines.push("*"+(i+1)+". "+(getExName(row,exercises)||"Ćwiczenie "+(i+1))+"*");
      row.sets.forEach((s,si)=>lines.push("  Seria "+(si+1)+": "+(s.weight||"—")+"kg × "+(s.reps||"—")+" powt."+(s.note?" ("+s.note+")":"")));
    });
    setSummary(lines.join("\n"));
  };

  const [copyFlash,setCopyFlash]=useState(false);
  const doCopy=()=>{
    if(!summary)return;
    try{navigator.clipboard.writeText(summary);}
    catch{const ta=document.createElement("textarea");ta.value=summary;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
    setCopyFlash(true);setTimeout(()=>setCopyFlash(false),2000);
  };
  const handleNew=()=>{setSummary(null);setRows([mkRow(loc)]);setWname("");setDate(new Date().toISOString().slice(0,10));setSetComments({});setFirstSug({});setDismissedSug({});if(onBack)onBack();};

  if(summary)return h("div",{style:{display:"flex",flexDirection:"column",gap:16},className:"anim"},
    h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:C.accent,letterSpacing:".05em"}},"TRENING ZAPISANY ✓"),
    h(Card,null,h(Lbl,null,"Podsumowanie"),h("pre",{style:{fontSize:13,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.7,marginTop:8}},summary)),
    h("div",{style:{display:"flex",gap:10}},
      h(Btn,{onClick:doCopy,full:true,style:{flex:2,background:copyFlash?C.green:C.accent,color:C.accentTxt}},copyFlash?"✓ Skopiowano!":"📋 Kopiuj"),
      h(Btn,{onClick:handleNew,variant:"ghost",full:true,style:{flex:1}},"Nowy trening")
    )
  );

  return h("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    prEvent&&h(PRBanner,{exName:prEvent.exName,weight:prEvent.weight,onClose:()=>setPrEvent(null)}),
    h(RestTimer,{autoStartRef}),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      h("div",null,h(Lbl,null,"Nazwa treningu"),h(Inp,{value:wname,onChange:setWname,placeholder:"opcjonalnie"})),
      h("div",null,h(Lbl,null,"Data"),h(Inp,{type:"date",value:date,onChange:setDate}))
    ),
    h("div",null,h(Lbl,null,"Lokalizacja"),h(LocPicker,{value:loc,onChange:v=>{setLoc(v);setRows(r=>r.map(x=>({...x,location:v})))}})),
    h(Hr,{m:"4px 0"}),
    rows.map((row,ei)=>{
      const locObj=(gyms||LOCS_DEFAULT).find(l=>l.id===row.location)||(gyms||LOCS_DEFAULT)[gyms.length-1]||LOCS_DEFAULT[2];
      const exName=getExName(row,exercises);
      const oldPR=row.exId?getPR(row.exId,logs,row.location):0;
      const sug=firstSug[row.id],loadingSug=loadingFirstSug[row.id];
      return h("div",{key:row.id,className:"anim",style:{background:C.card,borderRadius:12,border:"1px solid "+C.border2,overflow:"hidden"}},
        h("div",{style:{padding:"12px 14px 0"}},
          // Row header
          h("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:10}},
            h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.accent,minWidth:26}},ei+1),
            h("div",{style:{flex:1}},
              row.exId
                ?h("div",{style:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
                    h("div",{style:{fontWeight:600,fontSize:14,color:C.text,flex:1}},exName),
                    (row.planSets||row.planReps)&&h(Tag,{color:C.muted2,small:true},(row.planSets||"?")+"×"+(row.planReps||"?")),
                    oldPR>0&&h(Tag,{color:C.accent,small:true},"PR: "+oldPR+"kg"),
                    h("button",{onClick:()=>setShowHist(s=>({...s,[row.id]:!s[row.id]})),style:{fontSize:11,fontWeight:600,cursor:"pointer",borderRadius:6,padding:"3px 8px",background:showHist[row.id]?C.blue+"22":"transparent",color:showHist[row.id]?C.blue:C.muted,border:"1px solid "+(showHist[row.id]?C.blue:C.border)}},"📊 Historia"),
                    h("button",{onClick:()=>updRow(row.id,{exId:null,customName:""}),style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12}},"zmień")

// ── AI Coach Tab ──────────────────────────────────────────────────────────────
function AICoachTab({logs,exercises,setExercises,apiKey,setApiKey,onSavePlan,messages,setMessages,pendingPlan,setPendingPlan,planSaved,setPlanSaved}){
  const C=useC();
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [keyInput,setKeyInput]=useState(apiKey||"");
  const [showKey,setShowKey]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"});},[messages]);
  useEffect(()=>{
    if(apiKey&&messages.length===0)setMessages([{role:"assistant",content:"Cześć! 👋 Jestem Twoim AI trenerem.\n\nMam dostęp do Twojej historii ("+logs.length+" treningów, "+exercises.length+" ćwiczeń).\n\nMogę pomóc z:\n• 🎯 Sugestią ciężarów\n• 📈 Analizą postępów\n• 🗓️ Tworzeniem planów\n\nO co chcesz zapytać?"}]);

// ── Stats Tab ─────────────────────────────────────────────────────────────────
function StatsTab({logs,exercises}){
  const gyms=useGyms();
  const lang=useLang();
  const C=useC();
  const [month,setMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();
  const firstDay=(new Date(month.y,month.m,1).getDay()+6)%7;
  const trainingDays=new Set(logs.filter(l=>{const d=new Date(l.date);return d.getFullYear()===month.y&&d.getMonth()===month.m;}).map(l=>new Date(l.date).getDate()));
  const monthNames=["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
  const monthLogs=logs.filter(l=>{const d=new Date(l.date);return d.getFullYear()===month.y&&d.getMonth()===month.m;});
  const monthVol=monthLogs.reduce((s,l)=>s+(l.volume||(l.rows||[]).reduce((ss,r)=>ss+calcVol(r.sets||[]),0)),0);
  const monthSets=monthLogs.reduce((s,l)=>(l.rows||[]).reduce((ss,r)=>ss+(r.sets||[]).filter(s2=>s2.reps||s2.weight).length,s),0);
  const totalVol=logs.reduce((s,l)=>s+(l.volume||(l.rows||[]).reduce((ss,r)=>ss+calcVol(r.sets||[]),0)),0);
  const streak=useMemo(()=>{
    if(!logs.length)return 0;
    const sorted=[...new Set(logs.map(l=>l.date))].sort().reverse();
    let s=0,prev=null;
    for(const d of sorted){
      if(!prev){if((new Date()-new Date(d))/(86400000)>1.5)break;prev=d;s=1;continue;}
      if((new Date(prev)-new Date(d))/(86400000)<=1.5){s++;prev=d;}else break;
    }
    return s;
  },[logs]);
  const weeklyData=useMemo(()=>{
    return Array.from({length:8},(_,i)=>{
      const end=new Date();end.setDate(end.getDate()-(7-i)*7);
      const start=new Date(end);start.setDate(start.getDate()-6);
      const wl=logs.filter(l=>{const d=new Date(l.date);return d>=start&&d<=end;});
      return {label:start.toLocaleDateString("pl-PL",{day:"numeric",month:"numeric"}),vol:Math.round(wl.reduce((s,l)=>s+(l.volume||(l.rows||[]).reduce((ss,r)=>ss+calcVol(r.sets||[]),0)),0)),count:wl.length};
    });
  },[logs]);
  const muscleBreakdown=useMemo(()=>{
    const ago=new Date();ago.setDate(ago.getDate()-30);
    const counts={};
    logs.filter(l=>new Date(l.date)>=ago).forEach(log=>(log.rows||[]).forEach(row=>{
      const ex=exercises.find(e=>e.id===row.exId);
      const cat=ex&&ex.category?ex.category:"Inne";
      const sets=(row.sets||[]).filter(s=>s.reps||s.weight).length;
      counts[cat]=(counts[cat]||0)+sets;
    }));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  },[logs,exercises]);
  const maxWeekVol=Math.max(1,...weeklyData.map(w=>w.vol));
  const maxMuscle=Math.max(1,...muscleBreakdown.map(([,v])=>v));
  const MCOLS={"Klatka":"#4a7c59","Plecy":"#2e7d8a","Barki":"#7a6a3a","Biceps":"#5a4a7a","Triceps":"#7a3a3a","Nogi":"#3a6a7a","Brzuch":"#6a7a3a","Cardio":"#7a5a3a","Inne":"#555"};
  return h("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}},
      [["🏋️","Treningów",logs.length],["🔥","Streak",streak+" dni"],["📦","Łącznie",Math.round(totalVol/1000*10)/10+"t"]].map(([icon,label,val])=>
        h(Card,{key:label,style:{padding:"12px 14px",textAlign:"center"}},h("div",{style:{fontSize:22,marginBottom:4}},icon),h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.accent}},val),h("div",{style:{fontSize:10,color:C.muted,letterSpacing:".08em",textTransform:"uppercase",marginTop:2}},label))
      )
    ),
    h(Card,{style:{padding:16}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}},
        h("button",{onClick:()=>setMonth(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1}),style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:22,padding:"0 8px"}},"‹"),
        h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.text,letterSpacing:".05em"}},monthNames[month.m]+" "+month.y),
        h("button",{onClick:()=>setMonth(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1}),style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:22,padding:"0 8px"}},"›")
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}},
        ["Pn","Wt","Śr","Cz","Pt","So","Nd"].map(d=>h("div",{key:d,style:{fontSize:10,color:C.muted,textAlign:"center",letterSpacing:".04em"}},d))
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}},
        Array.from({length:firstDay},(_,i)=>h("div",{key:"e"+i})),
        Array.from({length:daysInMonth},(_,i)=>{
          const day=i+1,hasTr=trainingDays.has(day);
          const isToday=new Date().getDate()===day&&new Date().getMonth()===month.m&&new Date().getFullYear()===month.y;
          return h("div",{key:day,style:{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:7,fontSize:13,fontWeight:hasTr?700:400,background:hasTr?C.accent:isToday?C.surface:"transparent",color:hasTr?C.accentTxt:isToday?C.text:C.muted,border:isToday&&!hasTr?"1px solid "+C.border2:"none"}},day);
        })
      ),
      monthLogs.length>0&&h("div",{style:{marginTop:12,display:"flex",gap:16,borderTop:"1px solid "+C.border,paddingTop:12,flexWrap:"wrap"}},
        [["Treningów",monthLogs.length],["Objętość",Math.round(monthVol).toLocaleString()+" kg"],["Serie",monthSets]].map(([l,v])=>
          h("div",{key:l},h(Lbl,null,l),h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.accent}},v))
        )
      )
    ),
    h(Card,{style:{padding:16}},
      h(Lbl,null,"Objętość tygodniowa (kg)"),
      h("div",{style:{display:"flex",alignItems:"flex-end",gap:4,height:80,marginTop:10}},
        weeklyData.map((w,i)=>h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
          h("div",{style:{width:"100%",background:i===7?C.accent:C.accent+"55",borderRadius:"4px 4px 0 0",height:(w.vol/maxWeekVol*64)+"px",minHeight:w.vol>0?4:0,transition:"height .3s"}}),
          h("div",{style:{fontSize:8,color:C.muted,textAlign:"center",transform:"rotate(-35deg)",transformOrigin:"top center",marginTop:4,whiteSpace:"nowrap"}},w.label)
        ))
      )
    ),
    muscleBreakdown.length>0&&h(Card,{style:{padding:16}},
      h(Lbl,null,"Serie na partię (ostatnie 30 dni)"),
      h("div",{style:{display:"flex",flexDirection:"column",gap:8,marginTop:8}},
        muscleBreakdown.map(([cat,count])=>{
          const color=MCOLS[cat]||"#555";
          return h("div",{key:cat},
            h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},h("span",{style:{fontSize:13,color:C.text,fontWeight:600}},cat),h("span",{style:{fontSize:13,color:C.muted}},count+" serii")),
            h("div",{style:{height:8,background:C.surface,borderRadius:4,overflow:"hidden"}},h("div",{style:{height:"100%",width:(count/maxMuscle*100)+"%",background:color,borderRadius:4,transition:"width .5s ease"}}))
          );
        })
      )
    )
  );
}

// ── Workout Timer ────────────────────────────────────────────────────────────
function WorkoutTimer({startTime,lang}){
  const C=useC();
  // Calculate elapsed from startTime directly so tab switches don't reset
  const [,forceUpdate]=useState(0);
  useEffect(()=>{
    if(!startTime)return;
    const t=setInterval(()=>forceUpdate(n=>n+1),1000);
    return()=>clearInterval(t);
  },[startTime]);
  const elapsed=startTime?Math.floor((Date.now()-startTime)/1000):0;
  if(!startTime)return null;
  const h2=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;
  const label=h2>0?h2+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"):String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  return h("div",{style:{display:"flex",alignItems:"center",gap:6,background:C.surface,borderRadius:8,padding:"5px 10px",border:"1px solid "+C.border}},
    h("span",{style:{fontSize:12}},"⏱"),
    h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:C.accent,letterSpacing:".04em"}},label),
    h("span",{style:{fontSize:10,color:C.muted,letterSpacing:".06em",textTransform:"uppercase"}},lang==="en"?"training":"trening")
  );
}

  const [exercises,setExercises]=useState(()=>load(K.EX));
  const [apiKey,setApiKey]=useState(()=>loadStr(K.APIKEY));
  const C=isDark?DARK:LIGHT;
  const TABS=lang==="en"?TABS_EN:TABS_PL;
  const toggleTheme=()=>{const n=!isDark;setIsDark(n);saveStr(K.THEME,n?"dark":"light");};
  const toggleLang=()=>{const n=lang==="pl"?"en":"pl";setLang(n);saveStr(K.LANG,n);};
  const saveGyms=g=>{setGyms(g);save(K.GYMS,g);};
  useEffect(()=>{document.body.style.background=C.bg;document.body.style.color=C.text;},[isDark]);
  const saveLog=log=>{const u=[...logs,log];setLogs(u);save(K.LOGS,u);};
  const delLog=id=>{const u=logs.filter(l=>l.id!==id);setLogs(u);save(K.LOGS,u);};
  const savePlan=plan=>{const ex=load(K.PLANS);save(K.PLANS,[...ex,plan]);};

  // Lifted LogTab state
  const [logScreen,setLogScreen]=useState("start");
  const workoutStartTimeRef=useRef(null);
  const [workoutStartTime,setWorkoutStartTime]=useState(null);
  const startTimer=()=>{const t=Date.now();workoutStartTimeRef.current=t;setWorkoutStartTime(t);};
  const stopTimer=()=>{workoutStartTimeRef.current=null;stopTimer();};
  const [logDate,setLogDate]=useState(new Date().toISOString().slice(0,10));
  const [logWname,setLogWname]=useState("");
  const [logLoc,setLogLoc]=useState("free");
  const [logRows,setLogRows]=useState([mkRow("free")]);
  const [logSummary,setLogSummary]=useState(null);
  const [logPrEvent,setLogPrEvent]=useState(null);
  const [logSetCmts,setLogSetCmts]=useState({});
  const [logLoadingCmt,setLogLoadingCmt]=useState({});
  const [logCollapsed,setLogCollapsed]=useState({});
  const [logShowHist,setLogShowHist]=useState({});
  const [logFirstSug,setLogFirstSug]=useState({});
  const [logLoadingFirstSug,setLogLoadingFirstSug]=useState({});
  const [logDismissedSug,setLogDismissedSug]=useState({});
  // Lifted AI state
  const [aiMessages,setAiMessages]=useState([]);
  const [aiPendingPlan,setAiPendingPlan]=useState(null);
  const [aiPlanSaved,setAiPlanSaved]=useState(false);

  const startWorkoutFromPlan=(plan)=>{
    const newRows=(plan.exercises||[]).map(ex=>{
      const found=exercises.find(e=>e.name.toLowerCase()===(ex.name||"").toLowerCase());
      const numSets=parseInt(ex.sets)||3;
      const sets=Array.from({length:numSets},mkSet);
      return {...mkRow(logLoc),exId:found?found.id:null,customName:found?"":ex.name||"",sets,restSeconds:parseInt(ex.rest)||90};
    });
    setLogRows(newRows.length>0?newRows:[mkRow(logLoc)]);
    setLogWname(plan.name||"");setLogSummary(null);setLogSetCmts({});setLogFirstSug({});setLogDismissedSug({});
    setLogScreen("workout");startTimer();setTab("log");
  };

  const weekVol=useMemo(()=>{
    const ago=new Date();ago.setDate(ago.getDate()-7);
    return logs.filter(l=>new Date(l.date)>=ago).reduce((s,l)=>s+(l.volume||(l.rows||[]).reduce((ss,r)=>ss+calcVol(r.sets||[]),0)),0);
  },[logs]);

  const logTabProps={
    onSave:log=>{saveLog(log);setLogScreen("start");stopTimer();},
    exercises,logs,apiKey,onBack:()=>setLogScreen("start"),
    date:logDate,setDate:setLogDate,wname:logWname,setWname:setLogWname,
    loc:logLoc,setLoc:setLogLoc,rows:logRows,setRows:setLogRows,
    summary:logSummary,setSummary:setLogSummary,
    prEvent:logPrEvent,setPrEvent:setLogPrEvent,
    setComments:logSetCmts,setSetComments:setLogSetCmts,
    loadingCmt:logLoadingCmt,setLoadingCmt:setLogLoadingCmt,
    collapsed:logCollapsed,setCollapsed:setLogCollapsed,
    showHist:logShowHist,setShowHist:setLogShowHist,
    firstSug:logFirstSug,setFirstSug:setLogFirstSug,
    loadingFirstSug:logLoadingFirstSug,setLoadingFirstSug:setLogLoadingFirstSug,
    dismissedSug:logDismissedSug,setDismissedSug:setLogDismissedSug
  };

  return h(Ctx.Provider,{value:{C,isDark,toggleTheme,gyms,lang}},
    h("div",{style:{background:C.bg,minHeight:"100vh",color:C.text,maxWidth:600,margin:"0 auto",transition:"background .3s,color .3s"}},
      h("div",{style:{paddingTop:"calc(env(safe-area-inset-top,0px) + 16px)",padding:"calc(env(safe-area-inset-top,0px) + 16px) 18px 0",borderBottom:"1px solid "+C.border,position:"sticky",top:0,background:C.bg,zIndex:50,transition:"background .3s"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:14}},
          h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,color:C.accent,letterSpacing:".06em"}},"GYM"),
          h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,color:C.text,letterSpacing:".06em"}},"LOGGER"),
          weekVol>0&&h("div",{style:{fontSize:11,color:C.blue,marginLeft:4}},Math.round(weekVol/1000*10)/10+"t/7d"),
          h("div",{style:{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}},
            h("div",{style:{fontSize:11,color:C.muted}},logs.length+"tr"),
            h("button",{onClick:toggleTheme,style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:15}},isDark?"☀️":"🌙")
          )
        ),
        h("div",{style:{display:"flex",overflowX:"auto",gap:0}},
          TABS.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flexShrink:0,fontWeight:600,fontSize:10,letterSpacing:".07em",background:"none",border:"none",color:tab===t.id?C.accent:C.muted,padding:"8px 10px 10px",cursor:"pointer",borderBottom:"2px solid "+(tab===t.id?C.accent:"transparent"),transition:"all .15s"}},
            h("div",{style:{fontSize:14,marginBottom:2}},t.icon),t.label
          ))
        )
      ),
      h("div",{style:{padding:"18px 18px 80px"}},
        tab==="log"&&(logScreen==="start"
          ?h(StartScreen,{plans:load(K.PLANS),exercises,onStartFree:()=>{setLogRows([mkRow(logLoc)]);setLogWname("");setLogSummary(null);setLogSetCmts({});setLogFirstSug({});setLogDismissedSug({});setLogScreen("workout");startTimer();},onStartPlan:startWorkoutFromPlan})
          :h(Fragment,null,
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
              h("button",{onClick:()=>{setLogScreen("start");setLogSummary(null);stopTimer();},style:{fontSize:12,fontWeight:600,background:"transparent",border:"none",color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",gap:4}},lang==="en"?"← Change workout":"← Zmień trening"),
              h(WorkoutTimer,{startTime:workoutStartTime,lang})
            ),
              h(LogTab,logTabProps)
            )
        ),
        tab==="ai"&&h(AICoachTab,{logs,exercises,setExercises,apiKey,setApiKey,onSavePlan:savePlan,messages:aiMessages,setMessages:setAiMessages,pendingPlan:aiPendingPlan,setPendingPlan:setAiPendingPlan,planSaved:aiPlanSaved,setPlanSaved:setAiPlanSaved}),
        tab==="stats"&&h(StatsTab,{logs,exercises}),
        tab==="exercises"&&h(ExercisesTab,{exercises,setExercises,logs}),
        tab==="history"&&h(HistoryTab,{logs,onDelete:delLog,exercises}),
        tab==="plans"&&h(PlansTab,{onStartWorkout:startWorkoutFromPlan,exercises}),
        tab==="settings"&&h(SettingsTab,{gyms,onSaveGyms:saveGyms,isDark,toggleTheme,lang,toggleLang,apiKey,setApiKey})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
